  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0c10;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
    }
    #status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      justify-content: center;
      color: #8fa3bf;
      font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #0a0c10;
      transition: opacity 0.4s;
      z-index: 10;
    }
    #status.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #status .title {
      margin: 0;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c7d5ea;
    }
    #status .tagline {
      margin: 0;
      max-width: 30em;
      padding: 0 20px;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
      color: #6b7d94;
    }
    #statusText {
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="status">
    <h1 class="title">FizixLab</h1>
    <p id="statusText">loading&hellip;</p>
    <p class="tagline">An interactive physics sandbox for kinematics &amp; dynamics. Drop boxes, balls, springs, inclines and cannons, watch forces and free-body diagrams update in real time, and check your textbook answers. Runs in your browser on WebGPU.</p>
  </div>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <script>
    var Module = {
      canvas: document.getElementById('canvas'),
      // stdout/stderr go to the browser console instead of an on-page textarea
      print: (...args) => console.log(...args),
      printErr: (...args) => console.error(...args),
      setStatus: (text) => {
        const el = document.getElementById('statusText');
        if (el && text) el.textContent = text;
      },
      onRuntimeInitialized: () => {
        document.getElementById('status').classList.add('hidden');
      },
    };
    window.addEventListener('error', (e) => {
      Module.setStatus('Error — open the browser console for details');
    });
    if (!('gpu' in navigator)) {
      Module.setStatus('This browser does not support WebGPU — try a current version of Chrome or Edge.');
    }
  </script>
  {{{ SCRIPT }}}
</body>
</html>
