name: Deploy web build to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; a newer push supersedes an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same Emscripten version as local development (see README)
      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2
          actions-cache-folder: emsdk-cache

      - name: Configure (fetches WebGPU-distribution + emdawnwebgpu port)
        run: emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-web -j4

      - name: Assemble site
        run: |
          mkdir -p site
          cp build-web/App.html site/index.html
          cp build-web/App.js build-web/App.wasm build-web/App.data site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
